services:
  dockhand:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sagedockhand
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sagedockhand_data:/app/data
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0   # needed for Proxmox self-signed certs

volumes:
  sagedockhand_data:
